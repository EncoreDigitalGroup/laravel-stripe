workflow:
    auto_cancel:
        on_new_commit: interruptible

include:
    -   project: internal/ci-pipelines
        ref: main
        file:
            - /workflows/php/code-style.yml
            - /workflows/php/static-analysis.yml
            - /workflows/php/test.yml
            - /workflows/bun/build.yml
            - /workflows/gitlab/create-release.yml

stages:
    - quality
    - build
    - release

code_style:
    stage: quality
    extends: .php:code-style
    interruptible: true
    image:
        name: "$PHP_CI_IMAGE"
        pull_policy: always
    rules:
        -   if: $CI_PIPELINE_SOURCE == "merge_request_event"

static_analysis:
    stage: quality
    extends: .php:static-analysis
    interruptible: true
    variables:
        PHPSTAN_PATHS: "src/"
    image:
        name: "$PHP_CI_IMAGE"
        pull_policy: always
    rules:
        -   if: $CI_PIPELINE_SOURCE == "merge_request_event"
        -   if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

test:
    stage: quality
    extends: .php:test
    interruptible: true
    image:
        name: "$PHP_CI_IMAGE"
        pull_policy: always
    rules:
        -   if: $CI_PIPELINE_SOURCE == "merge_request_event"
        -   if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

bun_build:
    stage: build
    needs: [ code_style ]
    extends: .bun:build

release:
    stage: release
    extends: .gitlab:create-release
    interruptible: false
    rules:
        -   if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/